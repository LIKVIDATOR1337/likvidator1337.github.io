<!doctype html>
<html>
    <head>
    	<!-- Usage (Зависимости) -->
		<link rel="stylesheet" type="text/css" href="index.css">
    	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap" rel="stylesheet"> 
		<script src="index.js"></script>
		<!-- Авторефреш <meta http-equiv="refresh" content="1"> -->
		<!-- Usage End -->
		
		<title>Таблица</title>
   	</head>

   	<body>
   		
	<table border="1" align="center">
    	<tr>
    		<!-- Заголовки -->
        	<td colspan="1">Название</td>
        	<td colspan="1">Адрес</td>
        	<td colspan="1">Тип номера</td>
        	<td colspan="1">Цена за день</td>
    	</tr>

    	<tr><td rowspan="5">Центральная</td></tr>
    	<tr><td rowspan="4">Пр.Мира, д.4</td></tr>
    	<tr><td rowspan="1">Люкс одноместный</td><td>150$</td></tr>
    	<tr><td rowspan="1">Люкс двухместный</td><td>250$</td></tr>
    	<tr><td rowspan="1">Одноместный</td><td>80$</td></tr>

    	<tr><td rowspan="5">Спортивная</td></tr>
		<tr><td rowspan="4">Бульвар Профсоюзов, д. 15</td></tr>
    	<tr><td rowspan="1">Одноместный</td><td>50$</td></tr>
    	<tr><td rowspan="1">Двухместный</td><td>80$</td></tr>

    	<tr></tr>
    	<tr><td rowspan="2">Вокзальная</td></tr>
    	<tr><td>Привокзальная пл., д. 3</td><td>Четырехместный</td><td>50$</td></tr>
	</table>

	<br>
	<br>
	<table align="center" border="1" cellpadding="25" cellspacing="20" >
  		<tr><td colspan="5"></td></tr>
  		<tr><td rowspan="2" ></td><td></td><td rowspan="2"></td><td></td><td rowspan="2"></td></tr>
  		<tr><td rowspan="2"></td><td rowspan="2"></td></tr>
  		<tr><td></td><td></td><td></td></tr>
 	</table>
	<br>
	<br>

	<table align="center" border="4" cellpadding="20">
  		<tr><td colspan="8" bgcolor="#00FFFF"></td></tr>
  		<tr><td rowspan="6" bgcolor="#FF8C00"></td><td colspan="6" bgcolor="#00FFFF"></td><td rowspan="6" bgcolor="#FF8C00"></td></tr>
  		<tr><td rowspan="4" bgcolor="#FF8C00"></td><td colspan="4" bgcolor="#00FFFF"></td><td rowspan="4" bgcolor="#FF8C00"></td></tr>
  		<tr><td rowspan="2" bgcolor="#FF8C00"></td><td bgcolor="#ff0000"></td><td bgcolor="#000080"></td><td rowspan="2" bgcolor="#FF8C00"></td></tr>
 		<tr><td bgcolor="#008000"></td><td bgcolor="#FFD700"></td></tr>
 		<tr><td colspan="4" bgcolor="#00FFFF"></td></tr>
  		<tr><td colspan="6" bgcolor="#00FFFF"></td></tr>
  		<tr><td colspan="8" bgcolor="#00FFFF"></td></tr>
 	</table>


   	</body>
</html>
